version: "3.9"

services:
  db:
    image: postgres:15
    environment:
      POSTGRES_DB: pms_db
      POSTGRES_USER: pms_user
      POSTGRES_PASSWORD: pms_pass
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pms_user -d pms_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  api:
    build: .
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql://pms_user:pms_pass@db:5432/pms_db
      SECRET_KEY: change-me-in-production-32chars-min
      REDIS_URL: redis://redis:6379/0
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./uploads:/app/uploads
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  worker:
    build: .
    environment:
      DATABASE_URL: postgresql://pms_user:pms_pass@db:5432/pms_db
      REDIS_URL: redis://redis:6379/0
    depends_on:
      - redis
      - db
    command: celery -A app.worker worker --loglevel=info

volumes:
  pg_data:
